<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trading App</title>
    <style>
        body { background-color: #131722; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e222d; padding: 20px; border-radius: 10px; display: inline-block; min-width: 300px; }
        input { padding: 10px; margin: 10px; border-radius: 5px; border: none; width: 80%; }
        button { padding: 10px 20px; background: #f0b90b; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card" id="login-section">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="နာမည်ရိုက်ထည့်ပါ">
        <button onclick="login()">အကောင့်ဝင်ရန်</button>
    </div>

    <div class="card" id="main-section" style="display:none;">
        <h2 id="user-display"></h2>
        <div style="background: #2b3139; padding: 20px; border-radius: 10px; margin: 20px 0;">
            <p>လက်ကျန်ငွေ (USDT)</p>
            <div id="balance" style="font-size: 32px; font-weight: bold; color: #47dc82;">0.00</div>
        </div>
        
        <div id="tradingview_chart" style="height: 400px;"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const SERVER_URL = "https://my-trading-app-x9vx.onrender.com";

        async function login() {
            const nameInput = document.getElementById('username').value;
            if (!nameInput) return alert("နာမည်ရိုက်ထည့်ပါ");

            const response = await fetch(`${SERVER_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: nameInput })
            });

            const data = await response.json();
            if (data.success) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-section').style.display = 'block';
                document.getElementById('user-display').innerText = "မင်္ဂလာပါ " + nameInput;
                document.getElementById('balance').innerText = data.balance.toFixed(2);
                
                // Chart ကို စတင်ပြသခြင်း
                new TradingView.widget({
                    "width": "100%", "height": 400, "symbol": "BINANCE:BTCUSDT",
                    "interval": "1", "theme": "dark", "container_id": "tradingview_chart"
                });
            }
        }
    </script>
</body>
</html>
