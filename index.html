<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>My Trading App</title>
    <style>
        body { background-color: #0b0e11; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #1e2329; padding: 30px; border-radius: 15px; width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #2b3139; color: white; box-sizing: border-box; }
        .btn { background-color: #f0b90b; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; color: black; }
    </style>
</head>
<body>
    <div class="card" id="login-section">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="နာမည်ရိုက်ပါ">
        <button class="btn" onclick="login()">အကောင့်ဝင်ရန်</button>
    </div>

    <div class="card" id="main-section" style="display:none;">
        <h2 id="user-display"></h2>
        <div style="background: #2b3139; padding: 20px; border-radius: 10px; margin: 20px 0;">
            <p>လက်ကျန်ငွေ (USDT)</p>
            <div style="font-size: 32px; font-weight: bold; color: #47dc82;" id="balance">0.00</div>
        </div>
        <button class="btn" onclick="doDeposit()">ငွေသွင်းရန် (Deposit +50)</button>
    </div>

    <script>
        let currentUsername = "";
        // ဒီ Link လေးကိုပဲ နောက်ပိုင်း Online တင်ရင် ပြောင်းပေးရမှာပါ
        const SERVER_URL = "http://localhost:3000";

        async function login() {
            const nameInput = document.getElementById('username').value;
            if (!nameInput) return alert("နာမည်ရိုက်ထည့်ပါ");
            currentUsername = nameInput;
            const response = await fetch(`${SERVER_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUsername })
            });
            const data = await response.json();
            if (data.success) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-section').style.display = 'block';
                document.getElementById('user-display').innerText = "မင်္ဂလာပါ " + currentUsername;
                document.getElementById('balance').innerText = data.balance.toFixed(2);
            }
        }

        async function doDeposit() {
            const response = await fetch(`${SERVER_URL}/deposit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUsername })
            });
            const data = await response.json();
            document.getElementById('balance').innerText = data.newBalance.toFixed(2);
        }
    </script>
</body>
</html>
